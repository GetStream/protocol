        Submits a chat message task
      operationId: SubmitChatMessageTask
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitChatMessageTaskRequest'
        description: SubmitChatMessageTaskRequest
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitChatMessageTaskResponse'
          description: SubmitChatMessageTaskResponse
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Bad request
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Too many requests
      summary: Submit Chat Message Task
      tags:
